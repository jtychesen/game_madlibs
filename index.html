<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mad Libs Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-box">
        <h1>Mad Libs Game</h1>

        <input id="adjective1" type="text" placeholder="Enter an adjective">
        <input id="noun1" type="text" placeholder="Enter a noun">
        <input id="adjective2" type="text" placeholder="Enter another adjective">
        <input id="verb1" type="text" placeholder="Enter a verb ending with -ing">
        <input id="adjective3" type="text" placeholder="Enter one last adjective">

        <button onclick="createStory()">Create Story</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
